<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moda Testimonial — Tripleplay HTML Resource</title>
<style>
  /* United Sans Cond Heavy — the card face. Copied into ./fonts/ so the
     resource is self-contained when hosted in Tripleplay. */
  @font-face {
    font-family: "United Sans Cond Heavy";
    src: url("UnitedSansCdHv.otf") format("opentype");
    font-weight: normal;
    font-style: normal;
  }

  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }

  /* Fixed 1920x1080 design stage. The background plate (art + logos) lives
     here for standalone testing; in Tripleplay you can either keep it here or
     bake the plate in a layer behind a transparent HTML zone. */
  #stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    background-size: cover;
    background-position: center;
    font-family: "United Sans Cond Heavy", "Arial Narrow", sans-serif;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }

  /* The empty central band of the plate, below the baked logos. */
  /* opacity transitions give a smooth crossfade on change - no page reload, no flash */
  #quote {
    position: absolute;
    left: 50%;
    top: 30%;
    transform: translateX(-50%);
    width: 1400px;
    text-align: center;
    text-transform: uppercase;
    font-size: 66px;
    line-height: 1.18;
    letter-spacing: 0.01em;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  #attribution {
    position: absolute;
    left: 50%;
    top: 80%;
    transform: translateX(-50%);
    width: 1600px;
    text-align: center;
    text-transform: uppercase;
    font-size: 40px;
    letter-spacing: 0.06em;
    opacity: 1;
    transition: opacity 0.5s ease;
  }

  /* Visible only if the feed cannot be fetched/parsed — makes link tests
     (CORS/auth) obvious instead of a silent blank card. */
  #err {
    position: absolute; left: 0; bottom: 0; right: 0;
    background: rgba(200,0,0,0.85); color: #fff;
    font-family: monospace; font-size: 22px; padding: 12px 20px;
    text-transform: none; letter-spacing: normal; display: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="quote"></div>
    <div id="attribution"></div>
    <div id="err"></div>
  </div>

<script>
  // ---- CONFIG (override via query string for testing) ----------------------
  // ?feed=URL&plate=URL&rotate=ms
  var qs = new URLSearchParams(location.search);
  var CONFIG = {
    feed:   qs.get("feed")  || "signage-testimonials-feed.xml",
    plate:  qs.get("plate") || "24IPTV_RQ_Message_1_PLATE.png",
    rotate: parseInt(qs.get("rotate") || "8000", 10),  // ms per quote
    poll:   parseInt(qs.get("poll")   || "10000", 10)  // ms between feed re-fetches
  };

  var stage = document.getElementById("stage");
  var elQuote = document.getElementById("quote");
  var elAttr = document.getElementById("attribution");
  var elErr = document.getElementById("err");

  // Two deployment models:
  //  - Self-contained: HTML draws the plate (default; good for standalone tests
  //    and a single full-screen web zone).
  //  - Transparent overlay: pass ?plate=none so the web zone is transparent and
  //    a baked Tripleplay image layer shows the plate behind the text.
  if (CONFIG.plate && CONFIG.plate.toLowerCase() !== "none") {
    stage.style.backgroundImage = "url('" + CONFIG.plate + "')";
  } else {
    document.documentElement.style.background = "transparent";
    document.body.style.background = "transparent";
  }

  var items = [];
  var idx = 0;
  var curQuote = null;   // what's on screen now, so we don't re-fade identical content

  function showError(msg) {
    elErr.style.display = "block";
    elErr.textContent = "FEED ERROR: " + msg;
  }

  // Crossfade to one item. No-ops if it's already showing -> a background poll
  // that finds no change causes no flicker at all.
  function showItem(it) {
    var q = "“" + it.quote + "”";
    if (q === curQuote && elAttr.textContent === it.attribution) { return; }
    curQuote = q;
    elQuote.style.opacity = 0;
    elAttr.style.opacity = 0;
    setTimeout(function () {            // wait out the fade, then swap + fade back in
      elQuote.textContent = q;
      elAttr.textContent = it.attribution;
      elQuote.style.opacity = 1;
      elAttr.style.opacity = 1;
    }, 500);                            // matches the 0.5s CSS transition
  }

  function renderCurrent() { if (items.length) { showItem(items[idx % items.length]); } }
  function rotate() { idx++; renderCurrent(); }

  function parseFeed(xmlText) {
    var doc = new DOMParser().parseFromString(xmlText, "application/xml");
    if (doc.getElementsByTagName("parsererror").length) {
      throw new Error("XML not well-formed");
    }
    var nodes = doc.getElementsByTagName("item");
    var out = [];
    for (var i = 0; i < nodes.length; i++) {
      var q = nodes[i].getElementsByTagName("quote")[0];
      var a = nodes[i].getElementsByTagName("attribution")[0];
      out.push({
        quote: q ? q.textContent : "",
        attribution: a ? a.textContent : ""
      });
    }
    return out;
  }

  function loadFeed() {
    fetch(CONFIG.feed, { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.text();
      })
      .then(function (txt) {
        items = parseFeed(txt);
        elErr.style.display = "none";
        if (!items.length) showError("feed has no <item> elements");
        if (idx >= items.length) { idx = 0; }
        renderCurrent();
      })
      .catch(function (e) { showError(e.message + "  (" + CONFIG.feed + ")"); });
  }

  loadFeed();
  setInterval(rotate, CONFIG.rotate);   // rotate quotes (smooth crossfade)
  setInterval(loadFeed, CONFIG.poll);   // pick up XLS edits in the background
</script>
</body>
</html>
