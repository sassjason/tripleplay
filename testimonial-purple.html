<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Moda Testimonial — Tripleplay HTML Resource</title>
<style>
  @font-face {
    font-family: "United Sans Cond Heavy";
    src: url("UnitedSansCdHv.otf") format("opentype");
    font-weight: normal; font-style: normal;
  }

  html, body { margin: 0; padding: 0; background: #000; overflow: hidden; }

  #stage {
    position: relative;
    width: 1920px; height: 1080px;
    background-size: cover; background-position: center;
    font-family: "United Sans Cond Heavy", "Arial Narrow", sans-serif;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
  }

  /* Wrappers handle POSITION/centering (transform: translateX). The inner
     #quote / #attribution are free to be animated with their own transforms,
     so motion never fights the centering. */
  .pos { position: absolute; left: 50%; transform: translateX(-50%); }
  /* Fixed box: the quote auto-fits to the largest size that stays inside it,
     so a short quote fills the space and a long one shrinks instead of
     clipping at the bottom. */
  #quoteWrap {
    top: 26%; width: 1500px; height: 46%;
    display: flex; align-items: center; justify-content: center;
  }
  #attrWrap  { top: 80%; width: 1600px; }

  #quote {
    width: 100%;
    text-align: center; text-transform: uppercase;
    font-size: 66px; line-height: 1.14; letter-spacing: 0.01em;
    will-change: opacity;
    text-shadow: 0 2px 14px rgba(0,0,0,0.55);
  }
  #attribution {
    text-align: center; text-transform: uppercase;
    font-size: 40px; letter-spacing: 0.06em;
    will-change: opacity;
    text-shadow: 0 2px 12px rgba(0,0,0,0.55);
  }

  #clock {
    position: absolute; right: 48px; bottom: 42px;
    opacity: 0.85; display: none;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.55));
  }

  #err {
    position: absolute; left: 0; bottom: 0; right: 0;
    background: rgba(200,0,0,0.85); color: #fff;
    font-family: monospace; font-size: 22px; padding: 12px 20px;
    text-transform: none; letter-spacing: normal; display: none;
  }
</style>
</head>
<body>
  <div id="stage">
    <div class="pos" id="quoteWrap"><div id="quote"></div></div>
    <div class="pos" id="attrWrap"><div id="attribution"></div></div>
    <svg id="clock" width="54" height="54" viewBox="0 0 54 54" aria-hidden="true">
      <circle cx="27" cy="27" r="23" fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="4"></circle>
      <circle id="clockProg" cx="27" cy="27" r="23" fill="none" stroke="#ffffff" stroke-width="4"
              stroke-linecap="round" transform="rotate(-90 27 27)"></circle>
    </svg>
    <div id="err"></div>
  </div>

<script>
  // ---- CONFIG (override via query string) ----------------------------------
  // ?feed=URL &plate=URL|none &rotate=ms &poll=ms &anim=spring|words|fade|none
  var qs = new URLSearchParams(location.search);
  var CONFIG = {
    feed:   qs.get("feed")  || "signage-testimonials-purple-feed.xml",
    plate:  qs.get("plate") || "24IPTV_RQ_Message_Purple_PLATE.png",
    dwell:   parseInt(qs.get("dwell") || qs.get("rotate") || "8000", 10), // default ms a quote sits (per-slide Seconds overrides)
    enterMs: parseInt(qs.get("enter") || "1000", 10),                     // allowance for the entrance to finish
    poll:    parseInt(qs.get("poll")  || "10000", 10),
    anim:   (qs.get("anim")  || "fade").toLowerCase(),
    clock:  (qs.get("clock") || "1") !== "0"                              // bottom-right countdown ring
  };

  var stage   = document.getElementById("stage");
  var elQuote = document.getElementById("quote");
  var elAttr  = document.getElementById("attribution");
  var elErr   = document.getElementById("err");

  if (CONFIG.plate && CONFIG.plate.toLowerCase() !== "none") {
    stage.style.backgroundImage = "url('" + CONFIG.plate + "')";
  } else {
    document.documentElement.style.background = "transparent";
    document.body.style.background = "transparent";
  }

  var items = [], idx = 0, curQuote = null, bootstrapped = false;

  // Tripleplay re-serves the page on each channel cycle (~10s) - sooner than the
  // first rotation fires - so a plain idx=0 start would show only the first quote
  // forever. Persist the last-shown index per feed and resume on the NEXT one each
  // load, so the page advances whether rotation is driven by the reload or the timer.
  var IDX_KEY = "sigIdx:" + CONFIG.feed;
  function saveIdx(i) { try { localStorage.setItem(IDX_KEY, String(i)); } catch (e) {} }
  function loadIdx() { try { var v = parseInt(localStorage.getItem(IDX_KEY), 10); return isNaN(v) ? -1 : v; } catch (e) { return -1; } }

  function showError(msg) { elErr.style.display = "block"; elErr.textContent = "FEED ERROR: " + msg; }

  // ---- animation styles ----------------------------------------------------
  function cancelAnims(el) { if (el.getAnimations) { el.getAnimations().forEach(function (a) { a.cancel(); }); } }

  function fadeIn(el) { cancelAnims(el); el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 400, easing: "ease-in-out", fill: "both" }); }

  function enter() {
    if (CONFIG.anim === "none") { return; }
    fadeIn(elQuote); fadeIn(elAttr);
  }

  // ---- auto-fit: largest font size whose text stays inside the box ----------
  // Short quotes fill the space; long quotes shrink instead of clipping.
  var QUOTE_MIN = 28, QUOTE_MAX = 150;
  function fitQuote() {
    var box = elQuote.parentNode;                  // #quoteWrap (fixed width/height)
    var maxH = box.clientHeight, maxW = box.clientWidth;
    var lo = QUOTE_MIN, hi = QUOTE_MAX, best = QUOTE_MIN;
    while (lo <= hi) {
      var mid = (lo + hi) >> 1;
      elQuote.style.fontSize = mid + "px";
      if (elQuote.scrollHeight <= maxH && elQuote.scrollWidth <= maxW) { best = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    elQuote.style.fontSize = best + "px";
  }

  function showItem(it) {
    var q = "“" + it.quote + "”";
    if (q === curQuote && elAttr.textContent === it.attribution) { return; }
    var first = (curQuote === null);
    curQuote = q;
    saveIdx(idx % items.length);   // remember what's on screen so the next page load resumes after it

    function swapAndEnter() {
      elQuote.style.opacity = "0"; elAttr.style.opacity = "0";  // hide during font-fit to avoid visible resize flash
      elQuote.textContent = q; elAttr.textContent = it.attribution;
      fitQuote();
      enter(); scheduleNext();
    }

    if (first || CONFIG.anim === "none") {
      swapAndEnter();
    } else {
      cancelAnims(elQuote); cancelAnims(elAttr);
      var outOpts = { duration: 240, easing: "ease-in", fill: "both" };
      elAttr.animate([{ opacity: 1 }, { opacity: 0 }], outOpts);
      elQuote.animate([{ opacity: 1, transform: "scale(1)" }, { opacity: 0, transform: "scale(0.985)" }], outOpts)
        .finished.then(swapAndEnter, swapAndEnter);
    }
  }

  function renderCurrent() { if (items.length) { showItem(items[idx % items.length]); } }

  // ---- countdown ring (bottom-right) ---------------------------------------
  var clockSvg  = document.getElementById("clock");
  var clockProg = document.getElementById("clockProg");
  var CIRC = 2 * Math.PI * 23;
  if (clockProg) { clockProg.style.strokeDasharray = CIRC; clockProg.style.strokeDashoffset = CIRC; }

  function startClock(ms) {
    if (!clockProg) return;
    if (!CONFIG.clock || items.length <= 1) { clockSvg.style.display = "none"; return; }
    clockSvg.style.display = "block";
    cancelAnims(clockProg);
    clockProg.animate([{ strokeDashoffset: CIRC }, { strokeDashoffset: 0 }],
      { duration: ms, easing: "linear", fill: "forwards" });   // fills over this slide's time
  }

  // Per-slide dwell: the current item's Seconds (from the XLS), else the default.
  function currentDwell() {
    if (!items.length) return CONFIG.dwell;
    var s = items[idx % items.length].seconds;
    return (s && s > 0) ? s * 1000 : CONFIG.dwell;
  }

  // Rotation timer (re)starts each time a quote enters, so every quote sits for
  // a full dwell AFTER it settles. The ring tracks the same window.
  var nextTimer = null, paused = false;   // paused: set by the carousel while this layout is faded out
  function scheduleNext() {
    clearTimeout(nextTimer);
    if (paused) { return; }                // don't rotate while off-screen (prevents a mid-dissolve swap)
    var total = CONFIG.enterMs + currentDwell();
    startClock(total);
    nextTimer = setTimeout(advance, total);
  }
  function advance() {
    if (items.length <= 1) { scheduleNext(); return; }  // single quote: keep it sitting
    idx++;
    showItem(items[idx % items.length]);
  }

  function parseFeed(xmlText) {
    var doc = new DOMParser().parseFromString(xmlText, "application/xml");
    if (doc.getElementsByTagName("parsererror").length) { throw new Error("XML not well-formed"); }
    var nodes = doc.getElementsByTagName("item"), out = [];
    for (var i = 0; i < nodes.length; i++) {
      var qn = nodes[i].getElementsByTagName("quote")[0];
      var an = nodes[i].getElementsByTagName("attribution")[0];
      var sn = nodes[i].getElementsByTagName("seconds")[0];
      out.push({
        quote: qn ? qn.textContent : "",
        attribution: an ? an.textContent : "",
        seconds: sn ? parseInt(sn.textContent, 10) : 0
      });
    }
    return out;
  }

  function loadFeed() {
    var url = CONFIG.feed + (CONFIG.feed.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
    fetch(url, { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.text(); })
      .then(function (txt) {
        items = parseFeed(txt);
        elErr.style.display = "none";
        if (!items.length) showError("feed has no <item> elements");
        if (!bootstrapped && items.length) {        // first load after a (re)start: pick up where we left off
          bootstrapped = true;
          var prev = loadIdx();
          idx = (prev >= 0) ? ((prev + 1) % items.length) : 0;
        }
        if (idx >= items.length) { idx = 0; }
        renderCurrent();
      })
      .catch(function (e) { showError(e.message + "  (" + CONFIG.feed + ")"); });
  }

  loadFeed();                           // shows first quote, which starts the dwell timer chain
  setInterval(loadFeed, CONFIG.poll);   // pick up XLS edits in the background

  // Carousel sync (postMessage from signage-carousel.html). Pausing while faded out,
  // and starting a fresh dwell on fade-in, keeps a settled quote on screen through the
  // dissolve instead of swapping mid-fade. No effect when this page runs on its own.
  window.addEventListener("message", function (e) {
    var d = e && e.data;
    if (!d || !d.sig) { return; }
    if (d.sig === "show")      { paused = false; clearTimeout(nextTimer); scheduleNext(); }
    else if (d.sig === "hide") { paused = true;  clearTimeout(nextTimer); }
  });

  // The OTF loads async; once ready the text metrics change, so re-fit the quote.
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(function () { if (curQuote !== null) fitQuote(); });
  }
</script>
</body>
</html>
