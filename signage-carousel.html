<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signage Carousel — Tripleplay HTML Resource</title>
<!--
  signage-carousel.html
  ONE page that cycles through every layout (black / purple / newspaper) AND every
  uploaded still image, with a smooth crossfade. Point the Tripleplay channel at
  THIS file. Because Tripleplay then loads a single resource and never swaps pages -
  and because the stills live INSIDE this page rather than as separate Tripleplay
  media items - there is no hard "dip to black" and no codec/hardware-plane cut.
  Every transition is the dissolve this page controls.

  What it shows is driven by media-manifest.json (managed by Media-Admin):
    - layouts[]: the spreadsheet-driven pages; shown when enabled AND their feed
      has active rows. "Muted" (enabled:false) layouts are skipped.
    - items[]:   uploaded stills; shown when enabled. "Muted" stills are skipped.
  The manifest is re-read every lap, so muting/adding/deleting in the admin shows
  up on the screens within a lap without touching this file.

  Query overrides (optional):
    ?fade=800   crossfade ms        ?peritem=11000  ms per layout item (match layouts)
    ?min=12000  floor ms per slide  ?poll=60000     ms re-check when nothing is active
    ?manifest=media-manifest.json
-->
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }

  #deck { position: absolute; inset: 0; }

  /* Every slide (iframe layout OR img still) fills a 1920x1080 stage. */
  .layer {
    position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; border: 0;
    opacity: 0; transition: opacity var(--fade, 800ms) ease-in-out; will-change: opacity;
  }
  .layer.on { opacity: 1; }
  img.layer { object-fit: cover; }

  #cerr {
    position: absolute; left: 0; bottom: 0; right: 0;
    background: rgba(200,0,0,0.9); color: #fff;
    font-family: monospace; font-size: 22px; padding: 12px 20px; display: none;
  }
</style>
</head>
<body>
  <div id="deck"></div>
  <div id="cerr"></div>

<script>
  var qs = new URLSearchParams(location.search);
  var CONFIG = {
    fadeMs:    parseInt(qs.get("fade")    || "800", 10),
    perItemMs: parseInt(qs.get("peritem") || "11000", 10),
    minMs:     parseInt(qs.get("min")     || "12000", 10),
    poll:      parseInt(qs.get("poll")    || "60000", 10),
    manifest:  qs.get("manifest") || "media-manifest.json"
  };
  document.documentElement.style.setProperty("--fade", CONFIG.fadeMs + "ms");

  // Used if the manifest is missing or has no layouts[].
  var DEFAULT_LAYOUTS = [
    { name: "black",  src: "testimonial-black.html",  feed: "signage-testimonials-feed.xml",        enabled: true },
    { name: "purple", src: "testimonial-purple.html", feed: "signage-testimonials-purple-feed.xml", enabled: true },
    { name: "news",   src: "ripcity.html",            feed: "signage-ripcity-feed.xml",             enabled: true }
  ];

  var deck = document.getElementById("deck");
  var cerr = document.getElementById("cerr");
  function showErr(m) { cerr.style.display = "block"; cerr.textContent = "CAROUSEL: " + m; }

  // ---- layout iframes (created once per src, kept resident) -----------------
  var layoutObjs = {};                 // src -> { el, loaded, shown }
  function ensureLayout(src) {
    if (layoutObjs[src]) return layoutObjs[src];
    var f = document.createElement("iframe");
    f.className = "layer";
    f.setAttribute("scrolling", "no");
    var o = { el: f, loaded: false, shown: false, src: src };
    f.addEventListener("load", function () { o.loaded = true; syncLayer(o); });
    f.src = src;
    deck.appendChild(f);
    layoutObjs[src] = o;
    return o;
  }
  // Tell a layout whether it's on screen so it pauses/rotates accordingly (race-safe:
  // re-pushed from the iframe's load handler once it's ready).
  function syncLayer(o) {
    if (!o.loaded) return;
    try { o.el.contentWindow.postMessage({ sig: o.shown ? "show" : "hide" }, "*"); } catch (e) {}
  }

  // ---- image layers (created once per file, kept resident) ------------------
  var imgPool = {};                    // file -> { el, ready }
  function ensureImage(item) {
    var m = imgPool[item.file];
    if (m) return m;
    var img = document.createElement("img");
    img.className = "layer";
    img.alt = "";
    m = { el: img, ready: false };
    img.addEventListener("load",  function () { m.ready = true; });
    img.addEventListener("error", function () { m.ready = false; });
    img.src = item.file;               // e.g. "media/promo.png" (relative to this page)
    imgPool[item.file] = m;
    deck.appendChild(img);
    return m;
  }
  // Drop image elements no longer in the (enabled) set - but never yank the one
  // currently on screen; it's removed on a later lap once it's no longer current.
  function pruneImages(keepFiles) {
    Object.keys(imgPool).forEach(function (f) {
      if (keepFiles.indexOf(f) >= 0) return;
      var m = imgPool[f];
      if (cur && cur.el === m.el) return;
      try { deck.removeChild(m.el); } catch (e) {}
      delete imgPool[f];
    });
  }

  // ---- feed item count (decides if a layout has anything to show) -----------
  function fetchCount(layout) {
    var url = layout.feed + (layout.feed.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
    return fetch(url, { cache: "no-store" })
      .then(function (r) { return r.ok ? r.text() : ""; })
      .then(function (t) {
        try {
          var d = new DOMParser().parseFromString(t, "application/xml");
          if (d.getElementsByTagName("parsererror").length) return 0;
          return d.getElementsByTagName("item").length;
        } catch (e) { return 0; }
      })
      .catch(function () { return 0; });
  }

  function fetchManifest() {
    var url = CONFIG.manifest + (CONFIG.manifest.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
    return fetch(url, { cache: "no-store" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (j) { return j || {}; })
      .catch(function () { return {}; });
  }

  // ---- crossfade: incoming rises on top of the outgoing (no black mid-fade) --
  var cur = null, z = 1;
  function show(slide) {
    if (cur && cur.el === slide.el) return;
    var prev = cur;
    slide.el.style.zIndex = (++z);
    if (slide.kind === "layout") { slide.o.shown = true; syncLayer(slide.o); }  // resume incoming
    slide.el.classList.add("on");
    if (prev) {
      if (prev.kind === "layout") { prev.o.shown = false; syncLayer(prev.o); }  // pause outgoing
      var pe = prev.el;
      setTimeout(function () { pe.classList.remove("on"); }, CONFIG.fadeMs + 60);
    }
    cur = slide;
  }

  var idx = 0;
  function tick(slides) {
    if (!slides.length) { showErr("nothing enabled - add a still or unmute a layout"); setTimeout(loop, CONFIG.poll); return; }
    cerr.style.display = "none";
    if (idx >= slides.length) idx = 0;
    var s = slides[idx];
    show(s);
    idx++;
    if (idx >= slides.length) setTimeout(loop, s.dwellMs);   // end of a lap -> re-read manifest
    else setTimeout(function () { tick(slides); }, s.dwellMs);
  }

  function loop() {
    fetchManifest().then(function (mf) {
      var layoutDefs = (mf.layouts && mf.layouts.length) ? mf.layouts : DEFAULT_LAYOUTS;
      layoutDefs.forEach(function (l) { ensureLayout(l.src); });

      var enabledLayouts = layoutDefs.filter(function (l) { return l.enabled !== false; });
      var mediaItems = (mf.items || []).filter(function (i) { return i.enabled !== false && i.file; });
      mediaItems.forEach(ensureImage);
      pruneImages(mediaItems.map(function (i) { return i.file; }));

      Promise.all(enabledLayouts.map(fetchCount)).then(function (counts) {
        var slides = [];
        enabledLayouts.forEach(function (l, i) {
          if (counts[i] > 0) {
            slides.push({ kind: "layout", o: ensureLayout(l.src), el: layoutObjs[l.src].el,
                          dwellMs: Math.max(CONFIG.minMs, counts[i] * CONFIG.perItemMs) });
          }
        });
        mediaItems.forEach(function (it) {
          var m = imgPool[it.file];
          if (m && m.ready) {
            slides.push({ kind: "image", el: m.el,
                          dwellMs: Math.max(2000, (parseInt(it.seconds, 10) || 10) * 1000) });
          }
        });
        idx = 0;
        tick(slides);
      });
    });
  }

  loop();
</script>
</body>
</html>
